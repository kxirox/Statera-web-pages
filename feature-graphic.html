<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Feature Graphic 1024×500 — Stateri</title>
  <!--
    NOTE : Google Fonts est la seule dépendance réseau.
    Chrome la chargera automatiquement lors de la capture.
    Pour un export 100% offline, remplacez les polices par system-ui.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF8F4; margin: 0; padding: 0; display: block; }
  </style>
</head>
<body>

<!--
  ══════════════════════════════════════════
  FEATURE GRAPHIC  1024 × 500 px
  Google Play Store — Format requis
  ══════════════════════════════════════════
-->
<div style="
  width: 1024px;
  height: 500px;
  background: #FAF8F4;
  position: relative;
  overflow: hidden;
  font-family: 'Sora', system-ui, sans-serif;
">

  <!-- ── BACKGROUND DECORATIONS ── -->

  <!-- Large blurred circle, top-right -->
  <div style="
    position: absolute; right: -120px; top: -120px;
    width: 580px; height: 580px; border-radius: 50%;
    background: radial-gradient(circle, rgba(82,183,136,0.13) 0%, transparent 68%);
    pointer-events: none;
  "></div>

  <!-- Medium circle, bottom-left -->
  <div style="
    position: absolute; left: -60px; bottom: -60px;
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, rgba(45,106,79,0.07) 0%, transparent 70%);
    pointer-events: none;
  "></div>

  <!-- Thin green horizontal accent line at very top -->
  <div style="
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #2D6A4F 0%, #52B788 50%, transparent 100%);
  "></div>

  <!-- Subtle dot grid on right half -->
  <div style="
    position: absolute; left: 460px; top: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, rgba(45,106,79,0.07) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    pointer-events: none;
  "></div>


  <!-- ════════════════════════════════════
       LEFT SIDE — Brand & messaging
       ════════════════════════════════════ -->
  <div style="
    position: absolute;
    left: 60px; top: 50%;
    transform: translateY(-50%);
    width: 450px;
  ">

    <!-- Logo + brand name -->
    <div style="display:flex; align-items:center; gap:11px; margin-bottom:30px;">
      <img
        src="logo_stateri.png"
        alt="Stateri"
        style="width:42px;height:42px;border-radius:12px;object-fit:contain;display:block;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
      />
      <!-- SVG fallback if logo not found -->
      <div style="
        display:none; width:42px;height:42px;border-radius:12px;
        background:#2D6A4F; align-items:center;justify-content:center;
        font-size:22px;flex-shrink:0;
      ">⚖️</div>
      <span style="
        font-size:1.35rem; font-weight:800; color:#1A1A1A;
        letter-spacing:-0.03em;
      ">Stateri</span>
    </div>

    <!-- Main headline -->
    <div style="margin-bottom:18px; line-height:1.0;">
      <div style="
        font-size:3.15rem; font-weight:800;
        letter-spacing:-0.045em; color:#1A1A1A;
        line-height:1.05;
      ">Votre budget,</div>
      <div style="
        font-size:3.15rem; font-weight:800;
        letter-spacing:-0.045em; color:#2D6A4F;
        line-height:1.05;
      ">100% privé.</div>
    </div>

    <!-- Subtitle -->
    <p style="
      font-family:'Inter', system-ui, sans-serif;
      font-size:0.92rem; font-weight:400;
      color:#6B7280; line-height:1.65;
      margin-bottom:28px; max-width:390px;
    ">
      Budget personnel et gestion de son patrimoine.<br/>
      Vos données restent sur votre Google Drive.
    </p>

    <!-- 3 badges -->
    <div style="display:flex; gap:8px; flex-wrap:wrap;">

      <span style="
        font-family:'Inter', system-ui, sans-serif;
        font-size:0.77rem; font-weight:600;
        color:#2D6A4F;
        background:rgba(82,183,136,0.13);
        border:1.5px solid rgba(82,183,136,0.32);
        border-radius:100px; padding:6px 14px;
        display:inline-flex; align-items:center; gap:5px;
        letter-spacing:0.01em;
      "><span style="font-size:0.85rem;">📶</span> 100% offline</span>

      <span style="
        font-family:'Inter', system-ui, sans-serif;
        font-size:0.77rem; font-weight:600;
        color:#2D6A4F;
        background:rgba(82,183,136,0.13);
        border:1.5px solid rgba(82,183,136,0.32);
        border-radius:100px; padding:6px 14px;
        display:inline-flex; align-items:center; gap:5px;
        letter-spacing:0.01em;
      "><span style="font-size:0.85rem;">✓</span> Gratuit</span>

      <span style="
        font-family:'Inter', system-ui, sans-serif;
        font-size:0.77rem; font-weight:600;
        color:#2D6A4F;
        background:rgba(82,183,136,0.13);
        border:1.5px solid rgba(82,183,136,0.32);
        border-radius:100px; padding:6px 14px;
        display:inline-flex; align-items:center; gap:5px;
        letter-spacing:0.01em;
      "><span style="font-size:0.85rem;">🔒</span> Données privées</span>

    </div>

    <!-- Subtle URL -->
    <div style="
      margin-top:22px;
      font-family:'Inter', system-ui, sans-serif;
      font-size:0.72rem; font-weight:500;
      color:#B5B0A8; letter-spacing:0.02em;
    ">app.stateri.fr</div>

  </div>


  <!-- ════════════════════════════════════
       RIGHT SIDE — Screenshot patrimoine
       ════════════════════════════════════ -->

  <!-- Glow behind phone -->
  <div style="
    position:absolute; right:32px; top:50%;
    transform:translateY(-50%);
    width:280px; height:430px; border-radius:40px;
    background:radial-gradient(ellipse, rgba(45,106,79,0.20) 0%, transparent 68%);
    filter:blur(22px);
  "></div>

  <!-- Phone frame — height capped so it fits in 500px canvas -->
  <div style="
    position:absolute; right:56px; top:50%;
    transform:translateY(-50%);
    width:216px;
    background:#1A1A1A; border-radius:34px; padding:9px;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.2),
      0 14px 42px rgba(0,0,0,0.22),
      0 32px 80px rgba(0,0,0,0.14),
      inset 0 1px 0 rgba(255,255,255,0.09);
  ">
    <!-- Notch -->
    <div style="
      position:absolute; top:15px; left:50%; transform:translateX(-50%);
      width:64px; height:5px; background:#111; border-radius:3px; z-index:2;
    "></div>
